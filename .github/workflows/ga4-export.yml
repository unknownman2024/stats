name: Data Update (GA4 + Kerala BO)

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---- GA4 exporter ----
      - name: Run GA4 exporter
        env:
          GA4_KEY_JSON: ${{ secrets.GA4_KEY_JSON }}
        run: python main.py
        continue-on-error: true

      # ---- Kerala BO updater ----
      - name: Run Kerala BO updater
        run: python keralabo.py
        continue-on-error: true

      # ---- Commit and push ----
      - name: Commit and push updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add stats/ data/keralaspecial/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update data [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
          fi
