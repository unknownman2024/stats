<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Meta refresh: redirects immediately, works without JS -->
    <meta http-equiv="refresh" content="0; url=https://www.google.com">
    <style>
        /* Ensure the page stays blank */
        body { margin: 0; padding: 0; background: white; }
    </style>
</head>
<body>
    <!-- JavaScript fallback in case meta refresh is ignored -->
    <script>
        window.location.href = "https://bfilmy.pages.dev";
    </script>
    <!-- Absolutely no visible content -->
</body>
</html>
